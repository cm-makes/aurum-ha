<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="goldGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#FFD740"/>
      <stop offset="60%"  stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circleClip)">
    <!-- Gold background -->
    <circle cx="256" cy="256" r="256" fill="url(#goldGrad)"/>

    <!-- Sun rays: 8 short lines at r=215→252, evenly spaced 45° -->
    <!-- 0° -->
    <line x1="471" y1="256" x2="508" y2="256"
          stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.88"/>
    <!-- 45° -->
    <line x1="408" y1="408" x2="434" y2="434"
          stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.88"/>
    <!-- 90° -->
    <line x1="256" y1="471" x2="256" y2="508"
          stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.88"/>
    <!-- 135° -->
    <line x1="104" y1="408" x2="78"  y2="434"
          stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.88"/>
    <!-- 180° -->
    <line x1="41"  y1="256" x2="4"   y2="256"
          stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.88"/>
    <!-- 225° -->
    <line x1="104" y1="104" x2="78"  y2="78"
          stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.88"/>
    <!-- 270° -->
    <line x1="256" y1="41"  x2="256" y2="4"
          stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.88"/>
    <!-- 315° -->
    <line x1="408" y1="104" x2="434" y2="78"
          stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.88"/>

    <!-- Inner circle covers ray bases, keeps clean badge body -->
    <circle cx="256" cy="256" r="208" fill="url(#goldGrad)"/>

    <!-- Subtle inner ring for depth -->
    <circle cx="256" cy="256" r="208" fill="none"
            stroke="white" stroke-width="3" opacity="0.25"/>

    <!-- Letter A – white, bold, centred -->
    <text x="256" y="352"
          font-size="264"
          font-weight="700"
          font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
          fill="white"
          text-anchor="middle"
          letter-spacing="-8">A</text>
  </g>
</svg>
