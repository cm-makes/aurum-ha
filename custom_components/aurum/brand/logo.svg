<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 180" width="680" height="180">
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0F1A"/>
      <stop offset="100%" stop-color="#1A1F35"/>
    </linearGradient>
    <linearGradient id="goldL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A94C"/>
      <stop offset="30%" stop-color="#C8960A"/>
      <stop offset="60%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="lightL" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="darkL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8860A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="agedL">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="aged"/>
      <feComposite in="aged" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="glowL">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon badge -->
  <rect x="5" y="5" width="170" height="170" rx="34" fill="url(#bgL)"/>
  <rect x="5" y="5" width="170" height="170" rx="34" fill="url(#bgL)" filter="url(#agedL)" opacity="0.5"/>

  <!-- Maya frame -->
  <path d="M28 12 L152 12 L170 30 L170 152 L152 170 L28 170 L10 152 L10 30 Z"
        fill="none" stroke="url(#goldL)" stroke-width="1.2" opacity="0.25"/>
  <path d="M18 36 L18 18 L36 18" fill="none" stroke="url(#goldL)" stroke-width="1.5" opacity="0.4"/>
  <path d="M162 36 L162 18 L144 18" fill="none" stroke="url(#goldL)" stroke-width="1.5" opacity="0.4"/>
  <path d="M18 144 L18 162 L36 162" fill="none" stroke="url(#goldL)" stroke-width="1.5" opacity="0.4"/>
  <path d="M162 144 L162 162 L144 162" fill="none" stroke="url(#goldL)" stroke-width="1.5" opacity="0.4"/>

  <!-- K'in glyph (scaled) -->
  <g transform="translate(90,78)" filter="url(#glowL)">
    <!-- Cartouche -->
    <rect x="-42" y="-42" width="84" height="84" rx="16"
          fill="none" stroke="url(#goldL)" stroke-width="1.5" opacity="0.3"/>

    <!-- Sun disc -->
    <circle cx="0" cy="0" r="10" fill="url(#goldL)" opacity="0.65"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="url(#lightL)" stroke-width="0.8" opacity="0.4"/>
    <circle cx="0" cy="0" r="6.5" fill="none" stroke="url(#darkL)" stroke-width="0.6" opacity="0.35"/>
    <circle cx="0" cy="0" r="2.2" fill="url(#lightL)" opacity="0.85"/>

    <!-- Four petals -->
    <path d="M-6.5,-12 Q-7,-24 0,-30 Q7,-24 6.5,-12"
          fill="url(#goldL)" opacity="0.55" stroke="url(#goldL)" stroke-width="0.6"/>
    <path d="M-6.5,12 Q-7,24 0,30 Q7,24 6.5,12"
          fill="url(#goldL)" opacity="0.55" stroke="url(#goldL)" stroke-width="0.6"/>
    <path d="M-12,-6.5 Q-24,-7 -30,0 Q-24,7 -12,6.5"
          fill="url(#goldL)" opacity="0.55" stroke="url(#goldL)" stroke-width="0.6"/>
    <path d="M12,-6.5 Q24,-7 30,0 Q24,7 12,6.5"
          fill="url(#goldL)" opacity="0.55" stroke="url(#goldL)" stroke-width="0.6"/>

    <!-- Diagonal dots -->
    <circle cx="-19" cy="-19" r="2" fill="url(#goldL)" opacity="0.25"/>
    <circle cx="19" cy="-19" r="2" fill="url(#goldL)" opacity="0.25"/>
    <circle cx="-19" cy="19" r="2" fill="url(#goldL)" opacity="0.25"/>
    <circle cx="19" cy="19" r="2" fill="url(#goldL)" opacity="0.25"/>

    <!-- Petal dots -->
    <circle cx="0" cy="-22" r="1.2" fill="url(#lightL)" opacity="0.45"/>
    <circle cx="0" cy="22" r="1.2" fill="url(#lightL)" opacity="0.45"/>
    <circle cx="-22" cy="0" r="1.2" fill="url(#lightL)" opacity="0.45"/>
    <circle cx="22" cy="0" r="1.2" fill="url(#lightL)" opacity="0.45"/>
  </g>

  <!-- AURUM under icon -->
  <text x="90" y="152"
        font-size="14"
        font-weight="400"
        font-family="'Constantia','Perpetua','Garamond','Georgia',serif"
        fill="url(#goldL)"
        text-anchor="middle"
        letter-spacing="6"
        opacity="0.5">AURUM</text>

  <!-- ═══ WORDMARK ═══ -->

  <!-- Large AURUM -->
  <text x="210" y="108"
        font-size="76"
        font-weight="400"
        font-family="'Constantia','Perpetua','Garamond','Georgia',serif"
        fill="url(#goldL)"
        letter-spacing="14">AURUM</text>
  <!-- Chiseled shadow -->
  <text x="211" y="109"
        font-size="76"
        font-weight="400"
        font-family="'Constantia','Perpetua','Garamond','Georgia',serif"
        fill="url(#darkL)"
        letter-spacing="14"
        opacity="0.25">AURUM</text>

  <!-- Maya decorative line -->
  <line x1="210" y1="120" x2="620" y2="120"
        stroke="url(#goldL)" stroke-width="1.5" opacity="0.18"/>
  <g fill="url(#goldL)" opacity="0.12">
    <rect x="400" y="117" width="12" height="5" rx="1"/>
    <rect x="388" y="119" width="5" height="3" rx="0.5"/>
    <rect x="416" y="119" width="5" height="3" rx="0.5"/>
  </g>

  <!-- Tagline -->
  <text x="415" y="146"
        font-size="11"
        font-weight="400"
        font-family="'Constantia','Perpetua','Garamond','Georgia',serif"
        fill="url(#goldL)"
        text-anchor="middle"
        letter-spacing="5"
        opacity="0.3">SOLAR SURPLUS OPTIMIZER</text>

  <!-- Dots -->
  <g fill="url(#goldL)" opacity="0.12">
    <circle cx="360" cy="160" r="1.5"/>
    <circle cx="415" cy="160" r="1.5"/>
    <circle cx="470" cy="160" r="1.5"/>
  </g>
</svg>
