<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 125" width="430" height="125">
  <defs>
    <linearGradient id="goldL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A94C"/>
      <stop offset="30%" stop-color="#C8960A"/>
      <stop offset="60%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="darkL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8860A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <!-- ═══ WORDMARK ═══ -->

  <!-- Large AURUM (centered) -->
  <text x="185" y="68"
        font-size="76"
        font-weight="400"
        font-family="'Constantia','Perpetua','Garamond','Georgia',serif"
        fill="url(#goldL)"
        text-anchor="middle"
        letter-spacing="14">AURUM</text>
  <!-- Chiseled shadow -->
  <text x="187" y="70"
        font-size="76"
        font-weight="400"
        font-family="'Constantia','Perpetua','Garamond','Georgia',serif"
        fill="url(#darkL)"
        text-anchor="middle"
        letter-spacing="14"
        opacity="0.35">AURUM</text>

  <!-- Maya decorative line -->
  <line x1="20" y1="80" x2="410" y2="80"
        stroke="url(#goldL)" stroke-width="1.5" opacity="0.3"/>
  <g fill="url(#goldL)" opacity="0.25">
    <rect x="200" y="77" width="12" height="5" rx="1"/>
    <rect x="188" y="79" width="5" height="3" rx="0.5"/>
    <rect x="216" y="79" width="5" height="3" rx="0.5"/>
    <rect x="170" y="79" width="3" height="3" rx="0.5"/>
    <rect x="234" y="79" width="3" height="3" rx="0.5"/>
  </g>

  <!-- Tagline (centered under AURUM wordmark) -->
  <text x="185" y="106"
        font-size="11"
        font-weight="400"
        font-family="'Constantia','Perpetua','Garamond','Georgia',serif"
        fill="url(#goldL)"
        text-anchor="middle"
        letter-spacing="5"
        opacity="0.55">SOLAR SURPLUS OPTIMIZER</text>

  <!-- Dots (centered under AURUM wordmark) -->
  <g fill="url(#goldL)" opacity="0.12">
    <circle cx="130" cy="120" r="1.5"/>
    <circle cx="185" cy="120" r="1.5"/>
    <circle cx="240" cy="120" r="1.5"/>
  </g>
</svg>
