name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: AURUM Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "2026.3.4"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect vs. what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste any relevant log output from Home Assistant.
        Settings → System → Logs → filter for "aurum"
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Device configuration
      description: How many devices do you have configured? What types (washing machine, pool pump, etc.)?

  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
    validations:
      required: true
