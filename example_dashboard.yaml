## AURUM – Example Dashboard (v1.4.0)
## Copy this into a new Dashboard via Settings → Dashboards → Add Dashboard → Raw config editor
##
## Requirements: Mushroom Cards (installable via HACS)
## https://github.com/piitaya/lovelace-mushroom

title: AURUM Solar
views:
  - title: Solar
    icon: mdi:solar-power
    path: aurum
    cards:

      ##############################################################
      # HEADER
      ##############################################################
      - type: custom:mushroom-title-card
        title: AURUM Solar Optimizer
        subtitle: PV Surplus Distribution

      ##############################################################
      # STATUS CHIPS ROW
      ##############################################################
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: sensor.aurum_battery_mode
            icon_color: >
              {{ 'green' if is_state('sensor.aurum_battery_mode', 'normal')
                 else 'orange' if is_state('sensor.aurum_battery_mode', 'low_soc')
                 else 'red' }}
          - type: entity
            entity: sensor.aurum_excess_power
            icon: mdi:solar-power-variant
            icon_color: amber
          - type: entity
            entity: sensor.aurum_battery_soc
            icon: mdi:battery
            icon_color: >
              {% set soc = states('sensor.aurum_battery_soc') | float(0) %}
              {{ 'green' if soc >= 80 else 'orange' if soc >= 30 else 'red' }}
          - type: entity
            entity: sensor.aurum_forecast_remaining
            icon: mdi:solar-power-variant-outline
            icon_color: >
              {% set kwh = states('sensor.aurum_forecast_remaining') | float(0) %}
              {{ 'green' if kwh >= 5 else 'orange' if kwh >= 1 else 'grey' }}

      ##############################################################
      # ENERGY OVERVIEW (Grid, PV, House, Battery)
      ##############################################################
      - type: custom:mushroom-title-card
        title: Energy Overview

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.aurum_pv_power
            name: PV
            icon: mdi:solar-panel-large
            icon_color: amber

          - type: custom:mushroom-entity-card
            entity: sensor.aurum_grid_power
            name: Grid
            icon: mdi:transmission-tower
            icon_color: >
              {% set grid = states('sensor.aurum_grid_power') | float(0) %}
              {{ 'red' if grid > 0 else 'green' }}

          - type: custom:mushroom-entity-card
            entity: sensor.aurum_house_consumption
            name: House
            icon: mdi:home-lightning-bolt
            icon_color: blue

      ##############################################################
      # BATTERY SECTION (only shows when battery is configured)
      ##############################################################
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.aurum_battery_soc
            above: -1
        card:
          type: horizontal-stack
          cards:
            - type: gauge
              entity: sensor.aurum_battery_soc
              name: Battery SOC
              min: 0
              max: 100
              needle: true
              severity:
                green: 60
                yellow: 30
                red: 0

            - type: entities
              entities:
                - entity: sensor.aurum_battery_charge
                  name: Charging
                  icon: mdi:battery-charging
                - entity: sensor.aurum_battery_discharge
                  name: Discharging
                  icon: mdi:battery-arrow-down
              title: Battery Power

      ##############################################################
      # SOC THRESHOLDS (Target & Min)
      ##############################################################
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-number-card
            entity: number.aurum_target_soc
            name: Target SOC
            icon: mdi:battery-charging-80
            icon_color: green
            display_mode: slider
            fill_container: true

          - type: custom:mushroom-number-card
            entity: number.aurum_min_soc
            name: Min SOC
            icon: mdi:battery-alert
            icon_color: orange
            display_mode: slider
            fill_container: true

      ##############################################################
      # EXCESS POWER GAUGE
      ##############################################################
      - type: gauge
        entity: sensor.aurum_excess_power
        name: Available Surplus
        unit: W
        min: -2000
        max: 5000
        needle: true
        severity:
          green: 200
          yellow: 0
          red: -2000

      ##############################################################
      # PV FORECAST & BUDGET (only shows when forecast is configured)
      ##############################################################
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aurum_forecast_remaining
            state_not: unavailable
        card:
          type: custom:mushroom-title-card
          title: PV Forecast & Budget

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aurum_forecast_remaining
            state_not: unavailable
        card:
          type: horizontal-stack
          cards:
            - type: custom:mushroom-entity-card
              entity: sensor.aurum_forecast_remaining
              name: Forecast Today
              icon: mdi:solar-power-variant-outline
              icon_color: >
                {% set kwh = states('sensor.aurum_forecast_remaining') | float(0) %}
                {{ 'green' if kwh >= 5 else 'orange' if kwh >= 1 else 'grey' }}

            - type: custom:mushroom-entity-card
              entity: sensor.aurum_budget
              name: Device Budget
              icon: mdi:cash-clock
              icon_color: >
                {% set bw = states('sensor.aurum_budget') %}
                {{ 'green' if bw == 'unavailable' or bw | float(0) > 500
                   else 'orange' if bw | float(0) > 0
                   else 'red' }}

            - type: custom:mushroom-entity-card
              entity: sensor.aurum_safety_factor
              name: Safety Factor
              icon: mdi:shield-check
              icon_color: teal

      ##############################################################
      # DEVICES SECTION HEADER
      ##############################################################
      - type: custom:mushroom-title-card
        title: Devices
        subtitle: Managed by AURUM

      ##############################################################
      # DEVICE CARDS
      # Duplicate this block for each of your devices.
      # Replace "washing_machine" with your device name (lowercase, no spaces).
      #
      # MANUAL OVERRIDE:
      # Add an input_boolean per device in configuration.yaml:
      #   input_boolean:
      #     aurum_override_washing_machine:
      #       name: "Waschmaschine – Manual Override"
      # Then set manual_override_entity in the AURUM device config.
      # When the toggle is ON, AURUM skips the device completely.
      ##############################################################

      # --- Device 1: Washing Machine ---
      - type: custom:mushroom-template-card
        primary: Washing Machine
        secondary: >
          {{ states('sensor.aurum_washing_machine') | title }}
          — {{ states('sensor.aurum_washing_machine_power') | int(0) }} W
          — {{ states('sensor.aurum_washing_machine_runtime') | float(0) | round(0) | int }} min today
        icon: mdi:washing-machine
        icon_color: >
          {% set s = states('sensor.aurum_washing_machine') %}
          {{ 'green' if s == 'on' or s == 'running'
             else 'blue' if s == 'manual_override'
             else 'grey' }}
        badge_icon: >
          {% set s = states('sensor.aurum_washing_machine') %}
          {{ 'mdi:account' if s == 'manual_override'
             else 'mdi:check-circle' if s in ('on','running')
             else 'mdi:pause-circle' }}
        badge_color: >
          {% set s = states('sensor.aurum_washing_machine') %}
          {{ 'blue' if s == 'manual_override'
             else 'green' if s in ('on','running')
             else 'grey' }}
        tap_action:
          action: more-info
          entity: sensor.aurum_washing_machine

      # --- Manual Override & Muss-heute Toggles: Washing Machine ---
      # These switches are auto-created by AURUM. Uncomment to add to dashboard.
      # - type: horizontal-stack
      #   cards:
      #     - type: custom:mushroom-entity-card
      #       entity: switch.aurum_washing_machine_override
      #       name: Manual Override
      #       icon: mdi:account-lock-open
      #       icon_color: blue
      #     - type: custom:mushroom-entity-card
      #       entity: switch.aurum_washing_machine_muss_heute
      #       name: Muss heute
      #       icon: mdi:calendar-check
      #       icon_color: orange

      # --- Device 2: Dishwasher ---
      - type: custom:mushroom-template-card
        primary: Dishwasher
        secondary: >
          {{ states('sensor.aurum_dishwasher') | title }}
          — {{ states('sensor.aurum_dishwasher_power') | int(0) }} W
          — {{ states('sensor.aurum_dishwasher_runtime') | float(0) | round(0) | int }} min today
        icon: mdi:dishwasher
        icon_color: >
          {% set s = states('sensor.aurum_dishwasher') %}
          {{ 'blue' if s == 'on' or s == 'running'
             else 'deep-purple' if s == 'manual_override'
             else 'grey' }}
        badge_icon: >
          {% set s = states('sensor.aurum_dishwasher') %}
          {{ 'mdi:account' if s == 'manual_override'
             else 'mdi:check-circle' if s in ('on','running')
             else 'mdi:pause-circle' }}
        badge_color: >
          {% set s = states('sensor.aurum_dishwasher') %}
          {{ 'deep-purple' if s == 'manual_override'
             else 'blue' if s in ('on','running')
             else 'grey' }}
        tap_action:
          action: more-info
          entity: sensor.aurum_dishwasher

      # --- Manual Override & Muss-heute Toggles: Dishwasher ---
      # - type: horizontal-stack
      #   cards:
      #     - type: custom:mushroom-entity-card
      #       entity: switch.aurum_dishwasher_override
      #       name: Manual Override
      #       icon: mdi:account-lock-open
      #       icon_color: blue
      #     - type: custom:mushroom-entity-card
      #       entity: switch.aurum_dishwasher_muss_heute
      #       name: Muss heute
      #       icon: mdi:calendar-check
      #       icon_color: orange

      # --- Device 3: EV Charger ---
      - type: custom:mushroom-template-card
        primary: EV Charger
        secondary: >
          {{ states('sensor.aurum_ev_charger') | title }}
          — {{ states('sensor.aurum_ev_charger_power') | int(0) }} W
          — {{ states('sensor.aurum_ev_charger_runtime') | float(0) | round(0) | int }} min today
        icon: mdi:ev-station
        icon_color: >
          {% set s = states('sensor.aurum_ev_charger') %}
          {{ 'teal' if s == 'on' or s == 'running'
             else 'blue' if s == 'manual_override'
             else 'grey' }}
        badge_icon: >
          {% set s = states('sensor.aurum_ev_charger') %}
          {{ 'mdi:account' if s == 'manual_override'
             else 'mdi:check-circle' if s in ('on','running')
             else 'mdi:pause-circle' }}
        badge_color: >
          {% set s = states('sensor.aurum_ev_charger') %}
          {{ 'blue' if s == 'manual_override'
             else 'teal' if s in ('on','running')
             else 'grey' }}
        tap_action:
          action: more-info
          entity: sensor.aurum_ev_charger

      # --- Manual Override & Muss-heute Toggles: EV Charger ---
      # - type: horizontal-stack
      #   cards:
      #     - type: custom:mushroom-entity-card
      #       entity: switch.aurum_ev_charger_override
      #       name: Manual Override
      #       icon: mdi:account-lock-open
      #       icon_color: blue
      #     - type: custom:mushroom-entity-card
      #       entity: switch.aurum_ev_charger_muss_heute
      #       name: Muss heute
      #       icon: mdi:calendar-check
      #       icon_color: orange

      ##############################################################
      # STATISTICS
      ##############################################################
      - type: custom:mushroom-title-card
        title: Statistics

      - type: horizontal-stack
        cards:
          - type: statistic
            entity: sensor.aurum_washing_machine_runtime
            period:
              calendar:
                period: day
            stat_type: max
            name: Washer today
          - type: statistic
            entity: sensor.aurum_dishwasher_runtime
            period:
              calendar:
                period: day
            stat_type: max
            name: Dishwasher today

      ##############################################################
      # DIAGNOSTICS (collapsed by default)
      ##############################################################
      - type: custom:mushroom-title-card
        title: Diagnostics

      - type: entities
        entities:
          - entity: sensor.aurum_cycle
            name: Update Cycle
            icon: mdi:counter
          - entity: sensor.aurum_safety_factor
            name: Safety Factor
            icon: mdi:shield-check
          - entity: sensor.aurum_budget
            name: Device Budget
            icon: mdi:cash-clock
        title: AURUM Internals
