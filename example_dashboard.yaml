## AURUM – Example Dashboard
## Copy this into a new Dashboard via Settings → Dashboards → Add Dashboard → Raw config editor
##
## Requirements: Mushroom Cards (installable via HACS)
## https://github.com/piitaya/lovelace-mushroom

title: AURUM Solar
views:
  - title: Solar
    icon: mdi:solar-power
    path: aurum
    cards:

      ##############################################################
      # HEADER
      ##############################################################
      - type: custom:mushroom-title-card
        title: AURUM Solar Optimizer
        subtitle: PV Surplus Distribution

      ##############################################################
      # STATUS CHIPS ROW
      ##############################################################
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: sensor.aurum_battery_mode
            icon_color: >
              {{ 'green' if is_state('sensor.aurum_battery_mode', 'normal')
                 else 'orange' if is_state('sensor.aurum_battery_mode', 'low_soc')
                 else 'red' }}
          - type: entity
            entity: sensor.aurum_excess_power
            icon: mdi:solar-power-variant
            icon_color: amber
          - type: entity
            entity: sensor.aurum_battery_soc
            icon: mdi:battery
            icon_color: >
              {% set soc = states('sensor.aurum_battery_soc') | float(0) %}
              {{ 'green' if soc >= 80 else 'orange' if soc >= 30 else 'red' }}

      ##############################################################
      # ENERGY OVERVIEW (Grid, PV, House, Battery)
      ##############################################################
      - type: custom:mushroom-title-card
        title: Energy Overview

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.aurum_pv_power
            name: PV
            icon: mdi:solar-panel-large
            icon_color: amber

          - type: custom:mushroom-entity-card
            entity: sensor.aurum_grid_power
            name: Grid
            icon: mdi:transmission-tower
            icon_color: >
              {% set grid = states('sensor.aurum_grid_power') | float(0) %}
              {{ 'red' if grid > 0 else 'green' }}

          - type: custom:mushroom-entity-card
            entity: sensor.aurum_house_consumption
            name: House
            icon: mdi:home-lightning-bolt
            icon_color: blue

      ##############################################################
      # BATTERY SECTION
      ##############################################################
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.aurum_battery_soc
            name: Battery SOC
            min: 0
            max: 100
            needle: true
            severity:
              green: 60
              yellow: 30
              red: 0

          - type: entities
            entities:
              - entity: sensor.aurum_battery_charge
                name: Charging
                icon: mdi:battery-charging
              - entity: sensor.aurum_battery_discharge
                name: Discharging
                icon: mdi:battery-arrow-down
            title: Battery Power

      ##############################################################
      # SOC THRESHOLDS (Target & Min)
      ##############################################################
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-number-card
            entity: number.aurum_target_soc
            name: Target SOC
            icon: mdi:battery-charging-80
            icon_color: green
            display_mode: slider
            fill_container: true

          - type: custom:mushroom-number-card
            entity: number.aurum_min_soc
            name: Min SOC
            icon: mdi:battery-alert
            icon_color: orange
            display_mode: slider
            fill_container: true

      ##############################################################
      # EXCESS POWER GAUGE
      ##############################################################
      - type: gauge
        entity: sensor.aurum_excess_power
        name: Available Surplus
        unit: W
        min: -2000
        max: 5000
        needle: true
        severity:
          green: 200
          yellow: 0
          red: -2000

      ##############################################################
      # DEVICES SECTION HEADER
      ##############################################################
      - type: custom:mushroom-title-card
        title: Devices
        subtitle: Managed by AURUM

      ##############################################################
      # DEVICE CARDS
      # Duplicate this block for each of your devices
      # Replace "washing_machine" with your device name (lowercase, no spaces)
      ##############################################################

      # --- Device 1: Washing Machine ---
      - type: custom:mushroom-template-card
        primary: Washing Machine
        secondary: >
          {{ states('sensor.aurum_washing_machine') | title }}
          — {{ states('sensor.aurum_washing_machine_power') | int }} W
          — {{ states('sensor.aurum_washing_machine_runtime') | int }} min today
        icon: mdi:washing-machine
        icon_color: >
          {{ 'green' if is_state('sensor.aurum_washing_machine', 'on')
             else 'grey' }}
        badge_icon: >
          {{ 'mdi:check-circle' if is_state('sensor.aurum_washing_machine', 'on')
             else 'mdi:pause-circle' }}
        badge_color: >
          {{ 'green' if is_state('sensor.aurum_washing_machine', 'on')
             else 'grey' }}
        tap_action:
          action: more-info
          entity: sensor.aurum_washing_machine

      # --- Device 2: Dishwasher ---
      - type: custom:mushroom-template-card
        primary: Dishwasher
        secondary: >
          {{ states('sensor.aurum_dishwasher') | title }}
          — {{ states('sensor.aurum_dishwasher_power') | int }} W
          — {{ states('sensor.aurum_dishwasher_runtime') | int }} min today
        icon: mdi:dishwasher
        icon_color: >
          {{ 'blue' if is_state('sensor.aurum_dishwasher', 'on')
             else 'grey' }}
        badge_icon: >
          {{ 'mdi:check-circle' if is_state('sensor.aurum_dishwasher', 'on')
             else 'mdi:pause-circle' }}
        badge_color: >
          {{ 'blue' if is_state('sensor.aurum_dishwasher', 'on')
             else 'grey' }}
        tap_action:
          action: more-info
          entity: sensor.aurum_dishwasher

      # --- Device 3: EV Charger ---
      - type: custom:mushroom-template-card
        primary: EV Charger
        secondary: >
          {{ states('sensor.aurum_ev_charger') | title }}
          — {{ states('sensor.aurum_ev_charger_power') | int }} W
          — {{ states('sensor.aurum_ev_charger_runtime') | int }} min today
        icon: mdi:ev-station
        icon_color: >
          {{ 'teal' if is_state('sensor.aurum_ev_charger', 'on')
             else 'grey' }}
        badge_icon: >
          {{ 'mdi:check-circle' if is_state('sensor.aurum_ev_charger', 'on')
             else 'mdi:pause-circle' }}
        badge_color: >
          {{ 'teal' if is_state('sensor.aurum_ev_charger', 'on')
             else 'grey' }}
        tap_action:
          action: more-info
          entity: sensor.aurum_ev_charger

      ##############################################################
      # STATISTICS
      ##############################################################
      - type: custom:mushroom-title-card
        title: Statistics

      - type: horizontal-stack
        cards:
          - type: statistic
            entity: sensor.aurum_washing_machine_runtime
            period:
              calendar:
                period: day
            stat_type: max
            name: Washer today
          - type: statistic
            entity: sensor.aurum_dishwasher_runtime
            period:
              calendar:
                period: day
            stat_type: max
            name: Dishwasher today
